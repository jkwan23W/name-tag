<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinosophy Selection</title>
    
    <!-- Mobile App Settings (Add to Home Screen) -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vinosophy">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/763/763048.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* PRINT STYLES - A4 Precise Dimensions */
        @page { size: A4 portrait; margin: 0mm; }

        @media print {
            .no-print { display: none !important; }
            body { 
                margin: 0 !important; 
                padding: 0 !important; 
                background: white !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important;
            }
            .page-container { 
                display: block !important; 
                width: 210mm; 
                padding: 10mm; 
            }
            .grid-container { 
                display: grid !important; 
                grid-template-columns: 70mm 70mm !important; 
                gap: 0 !important; 
                justify-content: center; 
            }
            .name-tag-tent { 
                /* Thicker border for easier cutting */
                border: 0.4mm solid #cbd5e1 !important; 
                break-inside: avoid; 
                page-break-inside: avoid; 
                background-color: white !important; 
                box-shadow: none !important;
                border-radius: 0 !important;
            }
            .fold-line { border-top: 1px dashed #94a3b8 !important; }
        }
        
        /* SCREEN/APP STYLES */
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, 70mm);
            gap: 24px;
            padding: 20px;
            padding-bottom: 140px;
            justify-content: center;
        }

        .name-tag-tent {
            width: 70mm;
            height: 70mm;
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px -10px rgba(0, 0, 0, 0.12);
            border: 1px solid #e2e8f0;
        }

        .fold-line {
            position: absolute;
            top: 50%; left: 0; width: 100%;
            border-top: 1px dashed #cbd5e1;
            z-index: 10;
        }

        .tent-face-blank { height: 35mm; background-color: #fcfcfc; }
        
        .tent-face-name {
            height: 35mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 5mm;
            background: white;
        }

        .guest-name {
            font-family: 'Great Vibes', cursive;
            font-size: 24pt; 
            color: #005A7C; 
            text-align: center;
            line-height: 1.2;
        }

        /* App UI: Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-around;
            padding: 16px 10px calc(12px + env(safe-area-inset-bottom));
            z-index: 100;
            border-radius: 30px 30px 0 0;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.05);
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-btn:active { transform: scale(0.85); }

        .icon-box {
            width: 58px;
            height: 58px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 15px -3px rgba(0,0,0,0.1);
        }

        /* Animations */
        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="pb-32">

    <!-- Mobile Header -->
    <div class="no-print bg-white p-6 pb-4 border-b sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-slate-800 tracking-tight">Vinosophy</h1>
            <div class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-[#005A7C] animate-pulse"></span>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Dinner Concierge</p>
            </div>
        </div>
        <div class="flex gap-2">
            <!-- Names Button -->
            <button onclick="toggleGuests()" class="px-3 h-11 rounded-2xl bg-sky-50 flex items-center justify-center text-[#005A7C] hover:bg-sky-100 transition-all active:scale-95 gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <span class="text-xs font-bold uppercase tracking-wider">Names</span>
            </button>
            <!-- Settings Button -->
            <button onclick="toggleSettings()" class="w-11 h-11 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 hover:text-[#005A7C] transition-all active:bg-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </button>
        </div>
    </div>

    <!-- AI Insights Panel -->
    <div id="ai-result" class="hidden no-print px-4 pt-4">
        <div class="bg-slate-900 text-white rounded-[32px] p-7 shadow-2xl slide-up border border-white/5">
            <div class="flex justify-between items-center mb-5">
                <span id="ai-status" class="text-[10px] font-black text-[#005A7C] bg-white px-3 py-1 rounded-full uppercase tracking-widest">Sommelier Insight</span>
                <button onclick="document.getElementById('ai-result').classList.add('hidden')" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-white">✕</button>
            </div>
            <div id="ai-content" class="text-base font-light italic leading-relaxed whitespace-pre-wrap opacity-90"></div>
        </div>
    </div>

    <!-- Main View: Grid of Tags -->
    <div class="page-container">
        <div id="tags-container" class="grid-container"></div>
    </div>

    <!-- App Bottom Menu -->
    <div class="bottom-nav no-print">
        <button onclick="window.print()" class="nav-btn">
            <div class="icon-box bg-slate-800">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
            </div>
            <span class="text-[11px] font-black text-slate-500 uppercase tracking-tighter">Print PDF</span>
        </button>

        <button onclick="getAIDinnerPlan()" id="ai-btn" class="nav-btn">
            <div class="icon-box bg-[#005A7C]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
            </div>
            <span class="text-[11px] font-black text-[#005A7C] uppercase tracking-tighter">AI Butler</span>
        </button>
    </div>

    <!-- Guest List Modal -->
    <div id="guests-modal" class="hidden no-print fixed inset-0 bg-slate-900/70 backdrop-blur-xl z-[200] items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-8 max-w-sm w-full shadow-2xl flex flex-col max-h-[90vh]">
            <h2 class="text-3xl font-black mb-2 text-slate-800 tracking-tight">Guest List</h2>
            <p class="text-sm text-slate-400 mb-6 leading-relaxed">Paste names from Excel (one per line) below.</p>
            <textarea id="guest-input" class="w-full flex-1 bg-slate-50 border-none p-6 rounded-3xl mb-6 focus:ring-4 focus:ring-sky-50 transition outline-none font-medium resize-none text-slate-700" placeholder="Ming Fang&#10;Shelley Hon&#10;Angel Wei..."></textarea>
            <div class="flex gap-4">
                <button onclick="toggleGuests()" class="flex-1 py-4 font-bold text-slate-400">Cancel</button>
                <button onclick="saveGuests()" class="flex-1 py-4 bg-[#005A7C] text-white rounded-[24px] font-bold shadow-xl shadow-sky-100">Save List</button>
            </div>
        </div>
    </div>

    <!-- API Key Popup -->
    <div id="settings-modal" class="hidden no-print fixed inset-0 bg-slate-900/70 backdrop-blur-xl z-[200] items-center justify-center p-6">
        <div class="bg-white rounded-[40px] p-10 max-w-sm w-full shadow-2xl">
            <h2 class="text-3xl font-black mb-3 text-slate-800 tracking-tight">Settings</h2>
            <p class="text-sm text-slate-400 mb-9 leading-relaxed">Please configure your Gemini API Key to enable your personalized dinner concierge.</p>
            <input type="password" id="api-key-input" class="w-full bg-slate-50 border-none p-6 rounded-3xl mb-9 focus:ring-4 focus:ring-sky-50 transition outline-none font-medium" placeholder="Paste Key here...">
            <div class="flex gap-5">
                <button onclick="toggleSettings()" class="flex-1 py-5 font-bold text-slate-400">Cancel</button>
                <button onclick="saveKey()" class="flex-1 py-5 bg-[#005A7C] text-white rounded-[24px] font-bold shadow-xl shadow-sky-100">Save</button>
            </div>
        </div>
    </div>

    <script>
        // Default guest list
        let guests = [
            "Ming Fang", "Shelley Hon", "Angel Wei", "Shirley Chiu", 
            "Pierre", "Peter Wu"
        ];

        // Initialize App
        window.onload = () => {
            const savedGuests = localStorage.getItem('vinosophy_guests');
            if (savedGuests) {
                // User has saved guests before
                guests = JSON.parse(savedGuests);
                renderTags();
            } else {
                // First time visit: Show default list AND immediately open the editor
                renderTags();
                setTimeout(() => {
                    toggleGuests();
                }, 500);
            }
        };

        // Render function
        function renderTags() {
            const container = document.getElementById('tags-container');
            container.innerHTML = ''; // Clear existing
            guests.forEach(name => {
                const tag = document.createElement('div');
                tag.className = 'name-tag-tent';
                tag.innerHTML = `
                    <div class="fold-line"></div>
                    <div class="tent-face-blank"></div>
                    <div class="tent-face-name">
                        <div class="guest-name">${name}</div>
                    </div>
                `;
                container.appendChild(tag);
            });
        }

        // Guest Modal Management
        function toggleGuests() {
            const modal = document.getElementById('guests-modal');
            const isHidden = modal.classList.contains('hidden');
            
            if (isHidden) {
                modal.classList.remove('hidden');
                modal.style.display = 'flex';
                document.getElementById('guest-input').value = guests.join('\n');
            } else {
                modal.classList.add('hidden');
                modal.style.display = 'none';
            }
        }

        function saveGuests() {
            const rawInput = document.getElementById('guest-input').value;
            // Split by newline, trim whitespace, remove empty lines
            guests = rawInput.split('\n').map(name => name.trim()).filter(name => name.length > 0);
            localStorage.setItem('vinosophy_guests', JSON.stringify(guests));
            renderTags();
            toggleGuests();
        }

        // App State Management (API Settings)
        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            const isHidden = modal.classList.contains('hidden');
            
            if (isHidden) {
                modal.classList.remove('hidden');
                modal.style.display = 'flex';
                document.getElementById('api-key-input').value = localStorage.getItem('gemini_api_key') || "";
            } else {
                modal.classList.add('hidden');
                modal.style.display = 'none';
            }
        }

        function saveKey() {
            localStorage.setItem('gemini_api_key', document.getElementById('api-key-input').value);
            toggleSettings();
        }

        async function getAIDinnerPlan() {
            const key = localStorage.getItem('gemini_api_key');
            if (!key) { toggleSettings(); return; }

            const btn = document.getElementById('ai-btn');
            const resultDiv = document.getElementById('ai-result');
            const statusDiv = document.getElementById('ai-status');
            const contentDiv = document.getElementById('ai-content');

            btn.disabled = true;
            resultDiv.classList.remove('hidden');
            statusDiv.textContent = "Selecting a vintage toast...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${key}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Sommelier for Vinosophy Selection. Guest list: " + guests.join(", ") + ". Give an elegant toast and 2 icebreakers." }] }] })
                });
                const data = await response.json();
                statusDiv.textContent = "Sommelier's Toast";
                contentDiv.textContent = data.candidates[0].content.parts[0].text;
            } catch (err) {
                contentDiv.textContent = "Error: Please check your API key.";
            } finally { btn.disabled = false; }
        }
    </script>
</body>
</html>
